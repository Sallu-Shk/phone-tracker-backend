name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID'
        required: true
      features:
        description: 'Features JSON'
        required: true
      server_url:
        description: 'Server URL'
        required: true
      project_files:
        description: 'Project Files JSON'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Generate Project Files
      run: |
        python3 << 'PYTHON_SCRIPT'
        import json
        import os
        
        data = json.loads('''${{ github.event.inputs.project_files }}''')
        
        for path, content in data.items():
            full_path = os.path.join('app', path)
            os.makedirs(os.path.dirname(full_path), exist_ok=True)
            with open(full_path, 'w') as f:
                f.write(content)
        
        print("Files generated successfully!")
        PYTHON_SCRIPT
    
    - name: Create Gradle Wrapper
      run: |
        cd app
        mkdir -p gradle/wrapper
        echo 'distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists' > gradle/wrapper/gradle-wrapper.properties
        
        curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
        curl -L https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew -o gradlew
        chmod +x gradlew
    
    - name: Build APK
      run: |
        cd app
        ./gradlew assembleRelease --no-daemon
    
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ github.event.inputs.build_id }}
        name: APK Build ${{ github.event.inputs.build_id }}
        files: app/build/outputs/apk/release/app-release-unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
